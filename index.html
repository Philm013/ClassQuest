<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClassQuest</title>
    <meta
      name="description"
      content="ClassQuest is a browser-based gamified classroom manager for teachers and students."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar glass">
        <div>
          <p class="eyebrow">Browser-first classroom operations</p>
          <h1 class="brand-title">ClassQuest</h1>
        </div>
        <div class="topbar-actions">
          <span class="status-pill" id="global-connection-pill">Ready</span>
          <button class="ghost-button" id="home-button" type="button">Home</button>
        </div>
      </header>
      <main id="app"></main>
    </div>
    <div id="toast-region" aria-live="polite" aria-atomic="true"></div>
    <div id="celebration-root"></div>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
